{% extends "layout.html" %}

{% block content %}
<div style="max-width: 560px; margin: 80px auto; padding: 0 24px; text-align: center;">
    <div style="width: 72px; height: 72px; background: #dcfce7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
        <i class="fas fa-check" style="font-size: 2rem; color: var(--primary);"></i>
    </div>
    <h1 style="font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 12px;">You're all set!</h1>
    <p style="color: var(--text-muted); font-size: 1rem; line-height: 1.6; margin-bottom: 32px;">
        Your item has been submitted for review. We'll price it and let you know when it's live.
        Check your dashboard for updates.
    </p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="display: inline-block; padding: 14px 32px; font-size: 1rem;">
        Go to Dashboard
    </a>
</div>
{% endblock %}
