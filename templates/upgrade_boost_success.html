{% extends 'layout.html' %}

{% block content %}
<div style="max-width: 560px; margin: 60px auto; padding: 0 20px;">
    <div class="card" style="text-align: center; padding: 48px 40px;">
        <div style="font-size: 2.5rem; margin-bottom: 16px;">⚡</div>
        <h1 style="font-size: 2rem; color: var(--primary); margin-bottom: 16px;">You're boosted.</h1>
        <p style="font-size: 1.15rem; color: var(--text-main); margin-bottom: 8px;">
            Your payout rate is now <strong>{{ current_user.payout_rate }}%</strong>.
        </p>
        <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 32px;">
            Your 50% payout rate applies to all your items.
        </p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="display: inline-block; text-decoration: none;">
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
