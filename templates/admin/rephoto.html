{% extends "admin/admin_layout.html" %}

{% block admin_content %}
<style>
  .rp-wrap { max-width: 760px; margin: 0 auto; padding: 24px 20px 80px; }
  .rp-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:12px; }
  .rp-top h1 { font-family:'DM Serif Display',serif; font-size:1.5rem; color:var(--primary); margin:0; }

  .rp-banner {
    background:var(--bg-cream); border:var(--card-border); border-radius:12px;
    padding:12px 16px; font-size:0.86rem; color:var(--text-main); margin-bottom:18px;
    display:flex; align-items:center; gap:10px;
  }
  .rp-banner i { color:var(--sage); }

  .rp-search-wrap { position:relative; margin-bottom:14px; }
  .rp-search-wrap input {
    width:100%; padding:14px 44px 14px 16px; border:1.5px solid var(--rule);
    border-radius:12px; font-size:1.05rem; outline:none; box-sizing:border-box;
  }
  .rp-search-wrap input:focus { border-color:var(--primary); }
  .rp-search-wrap .rp-search-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); pointer-events:none; }

  #rp-results { margin-bottom:20px; }
  .rp-row {
    display:flex; align-items:center; gap:14px; background:white;
    border:var(--card-border); border-radius:12px; padding:10px 14px; margin-bottom:10px;
  }
  .rp-row--done { opacity:0.75; }
  .rp-row-thumb { width:64px; height:64px; border-radius:10px; object-fit:cover; flex-shrink:0; background:var(--bg-cream); }
  .rp-row-thumb--empty { display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:1.2rem; border:1.5px dashed var(--rule); box-sizing:border-box; }
  .rp-row-meta { flex:1; min-width:0; }
  .rp-row-title { font-weight:700; font-size:0.95rem; color:var(--text-main); overflow:hidden; text-overflow:ellipsis; }
  .rp-row-sub { font-size:0.8rem; color:var(--text-muted); margin-top:2px; }
  .rp-badge-done {
    display:inline-block; background:var(--sage); color:white; font-size:0.68rem;
    font-weight:800; padding:2px 8px; border-radius:999px; margin-left:6px;
    text-transform:uppercase; letter-spacing:0.04em; vertical-align:middle;
  }
  .rp-reshoot-btn {
    flex-shrink:0; background:var(--accent); color:white; border:none; border-radius:10px;
    padding:10px 16px; font-weight:700; font-size:0.88rem; cursor:pointer; font-family:inherit;
  }
  .rp-reshoot-btn:hover { background:var(--accent-hover); }

  .rp-empty { text-align:center; padding:28px 16px; color:var(--text-muted); }
  .rp-empty p { margin:10px 0 14px; font-size:0.92rem; }

  .rp-add-wrap { text-align:center; margin-top:8px; }
</style>

<div class="rp-wrap">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="rp-top">
    <h1><i class="fas fa-camera" style="margin-right:10px;color:var(--sage);"></i>Re-Photograph Items</h1>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <a href="{{ url_for('admin_rephoto_match_report') }}" class="btn-outline" style="padding:8px 16px; font-size:0.85rem; text-decoration:none;">
        <i class="fas fa-people-arrows" style="margin-right:6px;"></i>Match to Sellers
      </a>
      <a href="{{ url_for('admin_warehouse') }}" class="btn-outline" style="padding:8px 16px; font-size:0.85rem; text-decoration:none;">
        &larr; Warehouse Floor
      </a>
    </div>
  </div>

  <div class="rp-banner">
    <i class="fas fa-bullhorn"></i>
    <span>Re-photography campaign — started {{ campaign_label }}. Items re-shot today show a <strong>&check;</strong>.</span>
  </div>

  <div class="rp-search-wrap">
    <input type="text" id="rp-search" placeholder="Search the item you&rsquo;re holding&hellip; (couch, mini fridge, desk lamp)"
           autocomplete="off" autofocus>
    <i class="fas fa-search rp-search-icon"></i>
  </div>

  <div id="rp-results"></div>

  <div class="rp-add-wrap">
    <button type="button" class="rp-add-item-btn btn-outline" style="padding:10px 20px; font-size:0.9rem;">
      <i class="fas fa-plus"></i> Add an item that isn&rsquo;t listed
    </button>
  </div>
</div>

{% include 'admin/rephoto_capture_modal.html' %}

<script>
  const _rpCsrf = '{{ csrf_token() }}';

  // ── Debounced search ──
  var _rpSearchTimer = null;
  var _rpLastQuery = '';
  var _rpSearchInput = document.getElementById('rp-search');

  function rpRunSearch(q) {
    _rpLastQuery = q;
    if (!q.trim()) {
      document.getElementById('rp-results').innerHTML = '';
      return;
    }
    fetch('/admin/warehouse/rephoto/search?q=' + encodeURIComponent(q.trim()))
      .then(function(r){ return r.text(); })
      .then(function(html) {
        // Ignore stale responses that land after the query changed
        if (q === _rpLastQuery) {
          document.getElementById('rp-results').innerHTML = html;
        }
      })
      .catch(function(){ /* transient network error — keep previous results */ });
  }

  _rpSearchInput.addEventListener('input', function() {
    clearTimeout(_rpSearchTimer);
    var q = this.value;
    _rpSearchTimer = setTimeout(function(){ rpRunSearch(q); }, 300);
  });

  // Called by the capture modal on Done/Save so the ✓ badge refreshes
  function rpRefreshSearch() {
    _rpSearchInput.focus();
    if (_rpSearchInput.value.trim()) rpRunSearch(_rpSearchInput.value);
  }

  // ── Row actions (delegated — results are re-injected on every search) ──
  document.addEventListener('click', function(e) {
    var reshoot = e.target.closest('.rp-reshoot-btn');
    if (reshoot) {
      rpOpenCapture({
        mode: 'reshoot',
        itemId: parseInt(reshoot.dataset.itemId, 10),
        label: reshoot.dataset.itemLabel,
        coverUrl: reshoot.dataset.coverUrl || ''
      });
      return;
    }
    var addBtn = e.target.closest('.rp-add-item-btn');
    if (addBtn) {
      addBtn.disabled = true;
      var fd = new FormData();
      fd.append('csrf_token', _rpCsrf);
      fetch('/admin/warehouse/rephoto/add-item', { method:'POST', body:fd, headers:{'X-CSRFToken':_rpCsrf} })
        .then(function(r){ return r.json(); })
        .then(function(data) {
          addBtn.disabled = false;
          if (data.success) {
            rpOpenCapture({ mode:'add', itemId:data.item_id, label:'New item #' + data.item_id, coverUrl:'' });
          } else {
            alert(data.error || 'Could not create the item.');
          }
        })
        .catch(function() {
          addBtn.disabled = false;
          alert('Network error — could not create the item.');
        });
    }
  });
</script>
{% endblock %}
