{# Shared styles for the route photo reports (per-route + all-routes). Included in <head>. #}
<style>
  :root { --rpr-card: 116px; --rpr-cardgap: 6px; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    color: var(--text-main);
    background: var(--bg-cream);
    margin: 0;
    padding: 0 0 60px;
  }
  .rpr-wrap { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

  .rpr-header {
    display: flex; flex-wrap: wrap; align-items: flex-start; gap: 16px;
    justify-content: space-between;
    padding: 24px 0 18px;
    border-bottom: 2px solid var(--primary);
    margin-bottom: 20px;
  }
  .rpr-header h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1.9rem; margin: 0 0 4px; color: var(--primary);
  }
  .rpr-meta { font-size: 0.88rem; color: var(--text-muted); }
  .rpr-meta strong { color: var(--text-main); }
  .rpr-actions { display: flex; gap: 10px; flex-shrink: 0; }
  .rpr-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; font-size: 0.85rem; font-weight: 600;
    border-radius: 8px; text-decoration: none; cursor: pointer;
    font-family: inherit; border: 1.5px solid var(--primary);
  }
  .rpr-btn--solid { background: var(--primary); color: var(--text-light); }
  .rpr-btn--ghost { background: white; color: var(--primary); }
  .rpr-toggle { margin-top: 12px; }

  .rpr-notice {
    background: var(--amber-lt); border: 1px solid var(--accent);
    color: var(--accent-hover); border-radius: 8px;
    padding: 10px 14px; font-size: 0.85rem; font-weight: 500;
    margin-bottom: 20px;
  }

  .rpr-empty {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
    font-size: 1rem;
  }

  /* All-routes: one block per route, with a prominent route header. */
  .rpr-route { margin-bottom: 44px; }
  .rpr-route-header {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
    padding: 14px 0 10px; margin: 0 0 16px;
    border-bottom: 2px solid var(--primary);
  }
  .rpr-route-header h2 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1.5rem; margin: 0; color: var(--primary);
  }
  .rpr-route-header .rpr-route-meta { font-size: 0.85rem; color: var(--text-muted); }

  .rpr-stop { margin-bottom: 26px; }
  .rpr-stop h2 {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 1.05rem; font-weight: 600; color: var(--primary);
    margin: 0 0 12px; padding-bottom: 6px;
    border-bottom: 1px solid var(--rule);
  }
  .rpr-stop h2 .rpr-stop-count { color: var(--text-muted); font-weight: 400; font-size: 0.9rem; }

  .rpr-section-label {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.95rem; font-weight: 600; color: var(--slate);
    margin: 34px 0 8px; text-transform: uppercase; letter-spacing: 0.04em;
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
  }
  .photo-card {
    background: var(--card-bg); border: var(--card-border);
    border-radius: 10px; overflow: hidden; break-inside: avoid;
  }
  .photo-card img,
  .photo-card .photo-placeholder {
    display: block; width: 100%; aspect-ratio: 1 / 1;
    object-fit: cover; background: #EEE9E0;
  }
  .photo-placeholder {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 0.95rem; font-weight: 600;
  }
  .photo-card .card-body { padding: 8px 10px 10px; }
  .item-id { font-size: 0.8rem; font-weight: 700; color: var(--primary); margin: 0 0 2px; }
  .item-title {
    font-size: 0.82rem; color: var(--text-main); margin: 0 0 4px;
    line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .item-seller { font-size: 0.75rem; color: var(--text-muted); margin: 0; }

  /* ---- All-routes report: compact, routes packed onto shared rows ---- */
  .rpr-wrap--wide { max-width: 1500px; }

  .rpr-routes-flow {
    display: flex; flex-wrap: wrap; align-items: flex-start;
    gap: 22px 26px;
  }
  /* Each route sizes to its content but never exceeds 7 cards wide, so small
     routes stay narrow and pack together while big routes wrap internally. */
  .rpr-routes-flow .rpr-route {
    flex: 0 1 auto; margin-bottom: 0;
    max-width: calc(var(--rpr-card) * 7 + var(--rpr-cardgap) * 6);
  }
  /* Column count is set inline per stop (min(items, 7)); this only controls gap. */
  .rpr-routes-flow .photo-grid { gap: var(--rpr-cardgap); }
  /* Denser chrome for the compact view. */
  .rpr-routes-flow .rpr-route-header { padding: 8px 0 6px; margin-bottom: 10px; border-bottom-width: 1.5px; }
  .rpr-routes-flow .rpr-route-header h2 { font-size: 1.05rem; }
  .rpr-routes-flow .rpr-route-header .rpr-route-meta { font-size: 0.78rem; }
  .rpr-routes-flow .card-body { padding: 5px 7px 7px; }
  .rpr-routes-flow .item-id { font-size: 0.72rem; }
  .rpr-routes-flow .item-title { font-size: 0.72rem; margin-bottom: 2px; }
  .rpr-routes-flow .item-seller { font-size: 0.66rem; }

  @media print {
    body { background: white; padding: 0; }
    .rpr-wrap { max-width: none; padding: 0 8px; }
    .rpr-wrap--wide { max-width: none; }
    .rpr-actions { display: none !important; }
    .rpr-notice { border-color: #999; }
    .photo-grid { grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .photo-card { break-inside: avoid; border: 1px solid #ccc; }
    .rpr-stop h2, .rpr-section-label, .rpr-header, .rpr-route-header { break-after: avoid; }
    /* Single-route report: one route per sheet is fine (no .rpr-routes-flow). */
    .rpr-route { break-before: page; }
    .rpr-route:first-of-type { break-before: auto; }
    /* All-routes report: keep the packed flow on paper, don't page-break per route.
       Column count stays as the inline min(items, 7). */
    .rpr-routes-flow .rpr-route { break-before: auto; break-inside: avoid; }
    .rpr-lightbox { display: none !important; }
  }

  /* Click-to-enlarge lightbox (screen only) */
  .rpr-zoom { cursor: zoom-in; }
  .rpr-lightbox {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0, 0, 0, 0.85); align-items: center; justify-content: center;
    padding: 24px; cursor: zoom-out;
  }
  .rpr-lightbox.open { display: flex; }
  .rpr-lightbox img {
    max-width: 95vw; max-height: 95vh; object-fit: contain;
    border-radius: 8px; box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  }
</style>
