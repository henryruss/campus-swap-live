{# Shared category grid with subcategory pills — expects: categories (parent only) #}
<div class="category-grid" id="category-grid">
    {% for cat in categories %}
    <button type="button" class="category-card" data-category-id="{{ cat.id }}" data-category-name="{{ cat.name }}">
        <span class="category-icon">
            <i class="fas {{ cat.icon or cat.image_url or 'fa-box' }}"></i>
        </span>
        <span class="category-name">{{ cat.name }}</span>
    </button>
    {% endfor %}
</div>
<div id="subcategory-wrapper" class="subcategory-picker" style="display:none;">
    <div class="subcategory-picker-label">
        <i class="fas fa-arrow-right"></i>
        <span id="subcategory-prompt">Now pick a type:</span>
    </div>
    <div id="subcategory-container" class="subcategory-pills"></div>
</div>
<input type="hidden" name="category_id" id="category-id-input" value="" required>
<input type="hidden" name="subcategory_id" id="selected_subcategory_id" value="">
