{% extends "layout.html" %}

{% block content %}
<div class="container" style="max-width: 480px; margin-top: 80px; text-align: center;">
    <div class="card no-hover" style="padding: 48px 40px;">
        <i class="fas fa-check-circle" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 20px;"></i>
        <h2 style="margin-bottom: 12px;">Pickup is included</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px; line-height: 1.6;">
            We pick up all sellers — no upgrade needed. Your payout grows as you refer friends,
            starting at 20% and reaching up to 100%.
        </p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="display: inline-block; padding: 14px 32px;">
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
